name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # This single AppKit smoke opens a real NSWindow and requires an active
      # WindowServer session. It remains part of local/on-device QA.
      - run: >-
          swift test --skip
          'LassoConductorCoreTests.CaptureGridInteractionTests/testWindowDispatchDeliversClickMetadataToThumbnail'

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: node --test extension/test/*.test.mjs
